name: Playwright Tests

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    
    env:
      USERNAME: ${{ secrets.SWAG_USERNAME }}
      PASSWORD: ${{ secrets.SWAG_PASSWORD }}

    steps:
      # 1. Checkout
      - uses: actions/checkout@v4

      # 2. Node setup
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm'

      # 3. Install dependencies
      - name: Install dependencies
        run: npm ci

      # 4. Install browsers
      - name: Install Playwright
        run: npx playwright install --with-deps

      # 5. 🔐 RUN AUTH SETUP FIRST
      - name: Generate Auth State
        run: npx playwright test tests/auth.setup.spec.ts
        env:
        USERNAME: ${{ secrets.SWAG_USERNAME }}
        PASSWORD: ${{ secrets.SWAG_PASSWORD }}

      # 6. Run tests using stored session
      - name: Run Tests
        run: npx playwright test
        env:
        USERNAME: ${{ secrets.SWAG_USERNAME }}
        PASSWORD: ${{ secrets.SWAG_PASSWORD }}


      # 7. Upload report
      - name: Upload Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/

      # 8. Upload traces on failure
      - name: Upload Traces
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: traces
          path: test-results/